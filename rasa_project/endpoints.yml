# Rasa endpoints — action server URL + LLM/embedding model groups.
#
# The homework keeps LLM config in this file (not config.yml) — that's
# Rasa's 3.16+ recommendation. Both the command-generator and the
# embeddings provider are referenced by id from config.yml.

# ==============================================================================
# Action server
# ==============================================================================
# When you run `make rasa-actions` and `make rasa-serve` in separate
# terminals, both are on localhost. Change this URL if you deploy to
# a container or remote host.
action_endpoint:
  url: "http://localhost:5055/webhook"


# ==============================================================================
# LLM model groups — OpenAI-compatible provider config
# ==============================================================================
# IMPORTANT: Rasa's command generator parses structured commands
# (StartFlow, SetSlot, etc.) out of the LLM's response. Reasoning
# models emit <think>...</think> blocks before their final output,
# and Rasa's parser doesn't handle that cleanly. ALWAYS use an
# **instruct** model here, never a thinking/reasoning one.
#
# Rasa does env-variable substitution here, so OPENROUTER_API_KEY from
# .env flows through. Keep these as non-reasoning instruct/embedding
# models; Rasa's command parser expects concise structured output.

model_groups:
  - id: nebius_llm
    models:
      - provider: openrouter
        model: openai/gpt-4o-mini
        api_base: "https://openrouter.ai/api/v1"
        api_key: ${OPENROUTER_API_KEY}
        temperature: 0.1
        max_tokens: 1024
        timeout: 30

  - id: nebius_embeddings
    models:
      - provider: openrouter
        model: openai/text-embedding-3-small
        api_base: "https://openrouter.ai/api/v1"
        api_key: ${OPENROUTER_API_KEY}
